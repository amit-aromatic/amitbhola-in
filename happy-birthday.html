<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* Floating balloons */
    .balloons {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .balloon {
      position: absolute;
      bottom: -150px;
      width: 50px;
      height: 60px;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      animation: floatUp linear infinite;
      opacity: 0.85;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.4);
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-5deg); opacity: 0.85; }
      50%  { transform: translateY(-50vh) rotate(5deg); }
      100% { transform: translateY(-110vh) rotate(-5deg); opacity: 0; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      opacity: 0;
      animation: confettiFall linear infinite;
      z-index: 0;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 60px 50px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .cake {
      font-size: 80px;
      display: block;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .greeting {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      background: linear-gradient(90deg, #f9c74f, #f8961e, #f3722c, #f94144);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0 8px;
      line-height: 1.2;
    }

    .name {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.4rem, 8vw, 4rem);
      background: linear-gradient(90deg, #90e0ef, #48cae4, #00b4d8, #0096c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      margin-bottom: 20px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #f9c74f, #f94144);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .message {
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
    }

    .stars {
      margin-top: 28px;
      font-size: 1.6rem;
      letter-spacing: 6px;
      color: #f9c74f;
      text-shadow: 0 0 8px rgba(249, 199, 79, 0.8), 0 0 20px rgba(249, 199, 79, 0.4);
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .share-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #f9c74f, #f3722c);
      color: #1a1a2e;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(249,199,79,0.35);
    }
    .share-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(249,199,79,0.5);
    }
  </style>
</head>
<body>

<div class="balloons" id="balloons"></div>
<div id="confettiContainer"></div>

<div class="card">
  <span class="cake">🎂</span>
  <div class="greeting">Happy Birthday,</div>
  <span class="name" id="personName">Friend</span>
  <div class="divider"></div>
  <p class="message">
    May this special day bring you endless joy,<br>
    laughter, and all the happiness you deserve.<br>
    Wishing you a year full of beautiful moments! 🎉
  </p>
  <div class="stars">★ ★ ★ ★ ★</div>
  <a class="share-btn" id="shareBtn" href="#">🎁 Share This Wish</a>
</div>

<script>
  // --- Read name from URL path segment or query param ---
  function getName() {
    // 1. Try query param: ?name=John  or  ?n=John
    const params = new URLSearchParams(window.location.search);
    if (params.get('name')) return decodeURIComponent(params.get('name'));
    if (params.get('n'))    return decodeURIComponent(params.get('n'));

    // 2. Try last path segment: /happy_birthday/John  or  /John
    const segments = window.location.pathname.split('/').filter(Boolean);
    const last = segments[segments.length - 1];
    // Ignore if it looks like a filename
    if (last && !last.includes('.')) return decodeURIComponent(last);

    return 'Friend';
  }

  const name = getName();
  document.getElementById('personName').textContent = name;
  document.title = `Happy Birthday, ${name}!`;

  // Share button
  document.getElementById('shareBtn').addEventListener('click', function(e) {
    e.preventDefault();
    if (navigator.share) {
      navigator.share({ title: `Happy Birthday ${name}!`, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href).then(() => {
        this.textContent = '✅ Link Copied!';
        setTimeout(() => this.textContent = '🎁 Share This Wish', 2000);
      });
    }
  });

  // --- Balloons ---
  const colors = ['#f94144','#f3722c','#f9c74f','#90be6d','#43aa8b','#577590','#e040fb','#00b4d8'];
  const balloonContainer = document.getElementById('balloons');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = Math.random() * 100 + '%';
    b.style.width  = (40 + Math.random() * 30) + 'px';
    b.style.height = (50 + Math.random() * 35) + 'px';
    b.style.background = colors[Math.floor(Math.random() * colors.length)];
    b.style.animationDuration = (6 + Math.random() * 8) + 's';
    b.style.animationDelay   = (Math.random() * 8) + 's';
    balloonContainer.appendChild(b);
  }

  // --- Confetti ---
  const confettiColors = ['#f9c74f','#f94144','#90e0ef','#90be6d','#e040fb','#ffffff'];
  const shapes = ['circle','square'];
  const container = document.getElementById('confettiContainer');
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    c.style.left   = Math.random() * 100 + 'vw';
    c.style.width  = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    c.style.borderRadius = shape === 'circle' ? '50%' : '2px';
    c.style.animationDuration = (3 + Math.random() * 5) + 's';
    c.style.animationDelay   = (Math.random() * 6) + 's';
    container.appendChild(c);
  }
</script>
</body>
</html>
